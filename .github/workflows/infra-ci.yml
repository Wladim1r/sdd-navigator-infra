# @req SCI-CI-001, SCI-CI-002
name: Infrastructure CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  helm-lint:
    # @req SCI-CI-999
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Helm dependency update
        run: helm dependency update charts/sdd-navigator/
      - name: Helm lint
        run: helm lint charts/sdd-navigator/ --strict

  helm-validate:
    # @req SCI-CI-001, SCI-CI-002
    name: Helm Validate (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz && sudo mv kubeconform /usr/local/bin/
      - name: Helm dependency update
        run: helm dependency update charts/sdd-navigator/
      - name: Render and validate manifests
        run: |
          helm template sdd-release charts/sdd-navigator/ \
            | kubeconform \
              --strict \
              --summary \
              --kubernetes-version 1.28.0 \
              --ignore-missing-schemas

  ansible-lint:
    # @req SCI-CI-001
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ansible-lint
        run: pip install ansible-lint
      - name: Run ansible-lint
        run: ansible-lint ansible/

  yamllint:
    # @req SCI-CI-001
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  traceability:
    # @req SCI-TRACE-001
    name: Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run traceability check
        run: |
          chmod +x scripts/check-traceability.sh
          bash scripts/check-traceability.sh

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [helm-lint, helm-validate, ansible-lint, yamllint, traceability]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| helm-lint | ${{ needs.helm-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| helm-validate | ${{ needs.helm-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ansible-lint | ${{ needs.ansible-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| yamllint | ${{ needs.yamllint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| traceability | ${{ needs.traceability.result }} |" >> $GITHUB_STEP_SUMMARY
